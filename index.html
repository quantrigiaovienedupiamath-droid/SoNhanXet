<!DOCTYPE html>
<html lang="vi">
<head>
<base target="_top">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sổ Nhận Xét</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --ink: #133849; --paper: #fdfbf4; --paper-2: #f4ede0;
    --accent: #4fb1b8; --accent-2: #7dc8cd; --accent-dark: #3a8d93;
    --good: #3a8d93; --warn: #b54708; --bad: #9a1f1f;
    --line: #d9d2bf; --muted: #6b6457;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: 'Geist', sans-serif;
    background: var(--paper); color: var(--ink); min-height: 100vh;
    background-image: radial-gradient(circle at 20% 10%, rgba(79,177,184,0.10), transparent 40%), radial-gradient(circle at 80% 90%, rgba(125,200,205,0.12), transparent 40%);
  }
  .font-display { font-family: 'Fraunces', serif; }
  .font-mono { font-family: 'Geist Mono', monospace; }
  .paper-card { background: #fbfdf8; border: 1px solid var(--line); box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 4px 24px rgba(30,60,40,0.06); }
  .ink-btn { background: var(--ink); color: var(--paper); transition: all .15s; }
  .ink-btn:hover:not(:disabled) { background: #1d4d63; }
  .accent-btn { background: var(--accent); color: white; transition: all .15s; }
  .accent-btn:hover:not(:disabled) { background: var(--accent-dark); }
  .ghost-btn { border: 1px solid var(--ink); color: var(--ink); background: transparent; transition: all .15s; }
  .ghost-btn:hover:not(:disabled) { background: var(--ink); color: var(--paper); }
  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 500; border: 1px solid var(--line); background: rgba(255,255,255,0.5); }
  .chip-good { color: var(--good); background: rgba(58,141,147,0.08); }
  .chip-warn { color: var(--warn); background: rgba(181,71,8,0.06); }
  .chip-bad { color: var(--bad); background: rgba(154,31,31,0.06); }
  .chip-muted { color: var(--muted); }
  textarea.notebook { background: transparent; background-image: repeating-linear-gradient(to bottom, transparent, transparent 27px, rgba(19,56,73,0.12) 27px, rgba(19,56,73,0.12) 28px); line-height: 28px; padding-top: 4px; resize: vertical; width: 100%; outline: none; font-family: inherit; font-size: 15px; }
  input.field, select.field, textarea.field { background: #fbfdf8; border: 1px solid var(--line); border-radius: 6px; padding: 10px 14px; font-family: inherit; font-size: 14px; outline: none; }
  input.field:focus, select.field:focus, textarea.field:focus { border-color: var(--accent); }
  .stamp { display: inline-block; transform: rotate(-4deg); border: 2px solid var(--accent); color: var(--accent); padding: 3px 10px; font-family: 'Fraunces', serif; font-weight: 700; letter-spacing: 0.05em; font-size: 10px; text-transform: uppercase; border-radius: 4px; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .fade-up { animation: fadeUp .35s ease-out both; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--paper); padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 100; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
  .month-divider { border-top: 2px solid var(--accent); margin: 32px 0 16px; padding-top: 12px; }
</style>
</head>
<body>
<div id="root"><div style="min-height:100vh;display:grid;place-items:center;font-family:Geist,sans-serif;color:#5d6b58">Đang tải...</div></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;
const LOGO_URL = "./logo.jpg";

// ── API URL ──────────────────────────────────────────────────
const API_URL = "https://script.google.com/macros/s/AKfycbyskG1qtQYcEYHrpjzWoLVyykxU7Bxga7OGDGMA0MO8V1pbGyI1MLPX2DbQuGxWnnVk/exec";

// ── Smart Cache ─────────────────────────────────────────────
// Cache các API chỉ đọc (ít thay đổi), tự hết hạn sau 5 phút
// Sau khi GV lưu nhận xét → xóa cache liên quan ngay lập tức
const CACHE_TTL_MS = 5 * 60 * 1000; // 5 phút

// Các method được cache (chỉ đọc, ít thay đổi)
const CACHEABLE_METHODS = [
  'loadDashboardData',    // danh sách tuần + tổng quan → cache 5 phút
  'getWeeks',             // danh sách tab tuần
  'getDeadlinesForTeacher',
  'getStudentHistory',    // lịch sử HS
];

// Các method KHÔNG cache vì cần data mới nhất
// authenticate, getStudentsInWeek, getMonthlyStudents, saveFeedback, saveMonthlyReport

function cacheSet(key, data) {
  try {
    sessionStorage.setItem(key, JSON.stringify({ data, ts: Date.now() }));
  } catch(e) {}
}

function cacheGet(key) {
  try {
    const raw = sessionStorage.getItem(key);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (Date.now() - parsed.ts > CACHE_TTL_MS) {
      sessionStorage.removeItem(key);
      return null;
    }
    return parsed.data;
  } catch(e) { return null; }
}

function cacheClear(pattern) {
  try {
    const keys = Object.keys(sessionStorage);
    keys.forEach(k => { if (k.includes(pattern)) sessionStorage.removeItem(k); });
  } catch(e) {}
}

function callApi(method, ...args) {
  const cacheKey = 'api_' + method + '_' + JSON.stringify(args);
  if (CACHEABLE_METHODS.includes(method)) {
    const cached = cacheGet(cacheKey);
    if (cached) return Promise.resolve(cached);
  }

  // Timeout 40 giây - tránh treo vô hạn
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 40000);

  return fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: method, args: args }),
    redirect: 'follow',
    signal: controller.signal,
  })
  .then(res => {
    clearTimeout(timeoutId);
    if (!res.ok) throw new Error('Lỗi kết nối server: HTTP ' + res.status);
    return res.text();
  })
  .then(text => {
    if (!text || text.trim() === '') throw new Error('Server không trả về dữ liệu.');
    let data;
    try { data = JSON.parse(text); }
    catch(e) { throw new Error('Lỗi định dạng dữ liệu: ' + text.substring(0, 100)); }
    if (data.error) throw new Error(data.error);
    const finalResult = data.result !== undefined ? data.result : data;
    if (CACHEABLE_METHODS.includes(method)) {
      cacheSet(cacheKey, finalResult);
    }
    if (method === 'saveFeedback' || method === 'saveMonthlyReport') {
      cacheClear('api_getStudentsInWeek');
      cacheClear('api_getMonthlyStudents');
      cacheClear('api_getStudentHistory');
    }
    return finalResult;
  })
  .catch(e => {
    clearTimeout(timeoutId);
    if (e.name === 'AbortError') throw new Error('Kết nối quá chậm (>40s). Vui lòng thử lại.');
    throw e;
  });
}


function parseScore(raw) {
  if (raw === null || raw === undefined || raw === '') return null;
  const s = raw.toString().trim().toLowerCase();
  if (s.includes('chưa') || s.includes('nghỉ')) return null;
  const n = parseFloat(s.replace(',', '.'));
  return isNaN(n) ? null : n;
}

function getScoreChip(raw) {
  const n = parseScore(raw);
  if (n === null) return { cls: 'chip-muted', text: raw || '—' };
  if (n >= 8) return { cls: 'chip-good', text: raw };
  if (n >= 6.5) return { cls: 'chip-warn', text: raw };
  return { cls: 'chip-bad', text: raw };
}

function formatCountdown(msLeft) {
  if (msLeft <= 0) {
    const hoursOver = Math.floor(-msLeft / 3600000);
    if (hoursOver < 24) return { text: '⚠ Quá hạn ' + hoursOver + 'h', cls: 'chip-bad' };
    return { text: '⚠ Quá hạn ' + Math.floor(hoursOver / 24) + ' ngày', cls: 'chip-bad' };
  }
  const hours = msLeft / 3600000;
  if (hours < 1) return { text: '⏰ Còn ' + Math.floor(msLeft / 60000) + ' phút', cls: 'chip-bad' };
  if (hours < 12) return { text: '⏰ Còn ' + Math.floor(hours) + ' giờ', cls: 'chip-bad' };
  if (hours < 24) return { text: 'Còn ' + Math.floor(hours) + ' giờ', cls: 'chip-warn' };
  const days = Math.floor(hours / 24);
  const remHours = Math.floor(hours - days * 24);
  if (days < 7) return { text: 'Còn ' + days + 'd ' + remHours + 'h', cls: 'chip-good' };
  return { text: 'Còn ' + days + ' ngày', cls: 'chip-good' };
}

// ── Login ───────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [login, setLogin] = useState('');
  const [password, setPassword] = useState('');
  const [showPassword, setShowPassword] = useState(false);
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleSubmit = (e) => {
    e.preventDefault();
    setLoading(true);
    setError('');
    callApi('authenticate', login, password).then(data => {
      setLoading(false);
      if (data.error) { setError(data.error); return; }
      sessionStorage.setItem('teacher_login', data.login);
      sessionStorage.setItem('teacher_name', data.full_name);
      onLogin(data);
    }).catch(e => { setLoading(false); setError(e.toString()); });
  };

  return (
    <div className="min-h-screen grid place-items-center px-6">
      <form onSubmit={handleSubmit} className="paper-card rounded-xl p-10 max-w-md w-full">
        <div className="text-center mb-8">
          <img src={LOGO_URL} alt="Math Tutor" style={{width:120,height:120,margin:'0 auto 16px',objectFit:'contain'}} />
          <h1 className="font-display text-3xl font-semibold mb-1" style={{color:'var(--ink)'}}>Sổ Nhận Xét</h1>
          <p className="font-display italic text-base" style={{color:'var(--accent-dark)',marginTop:4}}>Nhận xét tận tâm, nâng tầm thế hệ</p>
        </div>
        <div className="space-y-4">
          <div>
            <label className="block text-xs font-mono uppercase tracking-wider text-[var(--muted)] mb-2">Tài khoản LMS</label>
            <input type="text" className="field w-full" placeholder="vd: linhnk2.math"
              value={login} onChange={e => setLogin(e.target.value)} required autoFocus />
          </div>
          <div>
            <label className="block text-xs font-mono uppercase tracking-wider text-[var(--muted)] mb-2">Mật khẩu</label>
            <div className="relative">
              <input type={showPassword ? "text" : "password"} className="field w-full pr-14"
                value={password} onChange={e => setPassword(e.target.value)} required />
              <button 
                type="button" 
                onClick={() => setShowPassword(!showPassword)}
                className="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-mono font-medium text-[var(--muted)] hover:text-[var(--ink)] transition-colors"
              >
                {showPassword ? "ẨN" : "HIỆN"}
              </button>
            </div>
          </div>
          {error && <div className="text-sm text-[var(--bad)] bg-[var(--bad)]/5 border border-[var(--bad)]/20 rounded-md px-3 py-2">{error}</div>}
          <button type="submit" disabled={loading} className="ink-btn w-full py-3 rounded-md font-medium">
            {loading ? 'Đang đăng nhập...' : 'Đăng nhập'}
          </button>
        </div>
        <p className="text-xs font-mono text-[var(--muted)] text-center mt-6">Liên hệ admin nếu chưa có tài khoản</p>
      </form>
    </div>
  );
}

// ── App ─────────────────────────────────────────────────────
function App() {
  const [teacher, setTeacher] = useState(() => {
    const login = sessionStorage.getItem('teacher_login');
    const name  = sessionStorage.getItem('teacher_name');
    return login ? { login, full_name: name } : null;
  });
  const [error, setError] = useState(null);
  const [classes, setClasses] = useState([]);
  const [weeks, setWeeks] = useState([]);       // mỗi week: { id, fileId, label, range }
  const [activeWeek, setActiveWeek] = useState(null);
  const [activeWeekFileId, setActiveWeekFileId] = useState(null);  // ← MỚI: fileId của tuần đang chọn
  const [fileInfo, setFileInfo] = useState(null);
  const [students, setStudents] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selected, setSelected] = useState(null);
  const [toast, setToast] = useState(null);
  const [mainTab, setMainTab] = useState('week');
  const [monthlyStudents, setMonthlyStudents] = useState([]);
  const [monthlyFile, setMonthlyFile] = useState(null);
  const [selectedMonthly, setSelectedMonthly] = useState(null);
  const [loadingMonthly, setLoadingMonthly] = useState(false);
  const [deadlines, setDeadlines] = useState({});
  const [nowTick, setNowTick] = useState(Date.now());

  const now = new Date();
  const [currentMonth] = useState(now.getMonth() + 1);
  const [currentYear]  = useState(now.getFullYear());

  // Tick mỗi 30 giây để cập nhật countdown
  useEffect(() => {
    const id = setInterval(() => setNowTick(Date.now()), 30000);
    return () => clearInterval(id);
  }, []);

  const handleLogout = () => {
    sessionStorage.removeItem('teacher_login');
    sessionStorage.removeItem('teacher_name');
    setTeacher(null);
    setClasses([]); setWeeks([]); setStudents([]);
    setFileInfo(null); setActiveWeek(null); setActiveWeekFileId(null);
    setMonthlyStudents([]); setSelectedMonthly(null); setError(null);
  };

  // Load monthly khi switch sang tab tháng
  useEffect(() => {
    if (mainTab !== 'month' || !teacher) return;
    setLoadingMonthly(true);
    // ── THAY ĐỔI: backend trả về students của cả T và T-1
    callApi('getMonthlyStudents', teacher.login, currentMonth, currentYear).then(d => {
      if (d.error) { setError(d.error); setLoadingMonthly(false); return; }
      setMonthlyStudents(d.students || []);
      setMonthlyFile(d.file);
      setLoadingMonthly(false);
    });
  }, [mainTab, teacher?.login]);

  const reloadMonthly = async () => {
    const d = await callApi('getMonthlyStudents', teacher.login, currentMonth, currentYear);
    if (d.students) setMonthlyStudents(d.students);
  };

  // Load dashboard lần đầu
  useEffect(() => {
    if (!teacher) { setLoading(false); return; }
    setLoading(true);
    // ── THAY ĐỔI: loadDashboardData giờ trả về weeks của cả T và T-1, kèm activeWeekFileId
    callApi('loadDashboardData', teacher.login, currentMonth, currentYear).then(data => {
      if (data.error) { setError(data.error); setLoading(false); return; }
      setTeacher(data.teacher);
      setClasses(data.classes);
      setWeeks(data.weeks);          // weeks[i].fileId đã có sẵn
      if (data.file) setFileInfo({ url: data.file.url, id: data.file.id });
      setActiveWeek(data.activeWeek);
      setActiveWeekFileId(data.activeWeekFileId);  // ← lưu fileId tuần active
      setStudents(data.students || []);
      setDeadlines(data.deadlines || {});
      setLoading(false);
    }).catch(e => { setError(e.toString()); setLoading(false); });
  }, [teacher?.login]);

  // Load students khi GV đổi tuần (skip lần đầu vì dashboard đã có sẵn)
  const [initialLoaded, setInitialLoaded] = useState(false);
  useEffect(() => {
    if (!activeWeek || !teacher) return;
    if (!initialLoaded) { setInitialLoaded(true); return; }

    if (!activeWeekFileId) return;
    setLoading(true);
    callApi('getStudentsInWeek', activeWeekFileId, activeWeek, teacher.login).then(data => {
      if (data.error) { setError(data.error); setLoading(false); return; }
      setStudents(data.students || []);
      if (data.deadlines) setDeadlines(data.deadlines);
      setLoading(false);
    }).catch(e => { setError(e.toString()); setLoading(false); });
  }, [activeWeek, activeWeekFileId]);

  // Khi user chọn tuần mới từ dropdown → cập nhật cả activeWeek lẫn activeWeekFileId
  const handleWeekChange = (weekId) => {
    const weekObj = weeks.find(w => w.id === weekId);
    if (!weekObj) return;
    setActiveWeek(weekId);
    setActiveWeekFileId(weekObj.fileId);  // ← cập nhật fileId cùng lúc
  };

  const classesByCode = useMemo(() => {
    const map = {};
    students.forEach(s => {
      if (!map[s.class_code]) map[s.class_code] = [];
      map[s.class_code].push(s);
    });
    return Object.entries(map).map(([code, list]) => ({ class_code: code, students: list }));
  }, [students]);

  const activeStudents = students.filter(s => !s.is_absent);
  const totalDone = activeStudents.filter(s => s.feedback_text && String(s.feedback_text).trim()).length;
  const total = activeStudents.length;

  const reloadStudents = async () => {
    if (!activeWeekFileId || !activeWeek) return;
    setLoading(true);
    try {
      const data = await callApi('getStudentsInWeek', activeWeekFileId, activeWeek, teacher.login);
      if (data.students) setStudents(data.students);
      if (data.deadlines) setDeadlines(data.deadlines);
    } catch (e) {
      alert("Lỗi khi tải lại dữ liệu: " + e.toString());
    }
    setLoading(false);
  };

  if (!teacher) return <LoginScreen onLogin={setTeacher} />;

  if (error) {
    return (
      <div className="min-h-screen grid place-items-center px-6">
        <div className="paper-card rounded-xl p-10 max-w-md w-full text-center">
          <h1 className="font-display text-2xl mb-3">⚠ Không thể truy cập</h1>
          <p className="text-sm text-[var(--muted)] mb-4">{error}</p>
          <button onClick={handleLogout} className="ghost-btn px-4 py-2 rounded text-sm">Đăng nhập lại</button>
        </div>
      </div>
    );
  }

  if (loading && classes.length === 0) {
    return (
      <div className="min-h-screen grid place-items-center px-6">
        <div className="text-center">
          <img src={LOGO_URL} alt="Math Tutor" style={{width:80,height:80,margin:'0 auto 20px',objectFit:'contain',opacity:0.6}} />
          <div style={{display:'flex',gap:6,justifyContent:'center',marginBottom:16}}>
            {[0,0.2,0.4].map((d,i) => <span key={i} style={{width:8,height:8,borderRadius:'50%',background:'var(--accent)',animation:`pulseDot 1.4s infinite ease-in-out ${d}s`}}></span>)}
          </div>
          <p className="text-sm text-[var(--muted)] font-mono">Đang tải dữ liệu lớp...</p>
        </div>
        <style>{`@keyframes pulseDot{0%,80%,100%{transform:scale(0.5);opacity:0.5}40%{transform:scale(1);opacity:1}}`}</style>
      </div>
    );
  }

  const activeWeekObj = weeks.find(w => w.id === activeWeek);

  return (
    <div className="min-h-screen">
      {/* Header */}
      <header className="border-b border-[var(--line)] bg-[#fbfdf8]/90 backdrop-blur-sm sticky top-0 z-10">
        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <img src={LOGO_URL} alt="Math Tutor" style={{width:40,height:40,objectFit:'contain'}} />
            <div>
              <h1 className="font-display font-semibold text-xl leading-none">Sổ Nhận Xét</h1>
              <p className="text-xs text-[var(--muted)] mt-0.5 font-mono">Google Sheet · Tháng {currentMonth}/{currentYear}</p>
            </div>
          </div>
          <div className="flex items-center gap-4">
            {fileInfo && (
              <a href={fileInfo.url} target="_blank" className="text-xs font-mono text-[var(--accent)] hover:underline">📁 Mở Sheet ↗</a>
            )}
            <div className="text-right hidden md:block">
              <p className="text-sm font-medium">{teacher?.full_name}</p>
              <p className="text-xs text-[var(--muted)] font-mono">{teacher?.login}</p>
            </div>
            <button onClick={handleLogout} className="text-xs font-mono text-[var(--muted)] hover:text-[var(--ink)] underline">Đăng xuất</button>
          </div>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-6 py-8">
        {/* Tab navigation */}
        <div className="mb-6 flex gap-1 p-1 bg-[var(--paper-2)] rounded-md inline-flex">
          <button onClick={() => setMainTab('week')}
            className={`px-5 py-2 text-sm rounded font-medium transition-all ${mainTab==='week'?'bg-[var(--ink)] text-[var(--paper)]':'text-[var(--ink)] hover:bg-black/5'}`}>
            📝 Nhận xét tuần
          </button>
          <button onClick={() => setMainTab('month')}
            className={`px-5 py-2 text-sm rounded font-medium transition-all ${mainTab==='month'?'bg-[var(--ink)] text-[var(--paper)]':'text-[var(--ink)] hover:bg-black/5'}`}>
            📋 Báo cáo tháng
          </button>
        </div>

        {/* ── TAB NHẬN XÉT TUẦN ─────────────────────────────── */}
        {mainTab === 'week' && (
        <>
          <div className="mb-6 flex items-end justify-between flex-wrap gap-4">
            <div>
              <p className="text-xs font-mono uppercase tracking-[0.2em] text-[var(--muted)] mb-2">
                {activeWeekObj?.range || 'Nhận xét tuần'}
              </p>
              <h1 className="font-display text-4xl md:text-5xl font-semibold leading-none">{activeWeekObj?.label || '—'}</h1>
              <p className="mt-3 text-[var(--muted)] max-w-xl">
                Sau 2 buổi học, viết nhận xét cho từng học sinh.
              </p>
            </div>
            {total > 0 && (
              <div className="text-right">
                <div className="text-xs font-mono uppercase tracking-wider text-[var(--muted)]">Tiến độ tuần</div>
                <div className="font-display text-3xl font-semibold mt-1">{totalDone}<span className="text-[var(--muted)] text-xl">/{total}</span></div>
                <div className="w-40 h-1.5 bg-[var(--paper-2)] rounded-full mt-2 overflow-hidden">
                  <div className="h-full bg-[var(--accent)] rounded-full transition-all" style={{width:`${total>0?totalDone/total*100:0}%`}}/>
                </div>
              </div>
            )}
          </div>

          {/* ── THAY ĐỔI: dropdown tuần dùng handleWeekChange thay vì setActiveWeek trực tiếp */}
          <div className="mb-6 flex items-center justify-between flex-wrap gap-3">
            <div className="flex items-center gap-3 flex-wrap">
              <label className="text-xs font-mono uppercase tracking-wider text-[var(--muted)]">Chọn tuần:</label>
              <select className="field" value={activeWeek || ''} onChange={e => handleWeekChange(e.target.value)}>
                {weeks.map(w => <option key={w.id} value={w.id}>{w.label} · {w.range}</option>)}
              </select>
            </div>
            <button onClick={reloadStudents} disabled={loading} className="chip chip-muted hover:bg-[var(--ink)] hover:text-[var(--paper)] transition-all font-mono text-xs flex items-center gap-1">
              🔄 Tải lại dữ liệu
            </button>
          </div>

          {loading ? (
            <div className="paper-card rounded-lg p-12 text-center text-[var(--muted)] font-mono text-sm">Đang tải...</div>
          ) : classesByCode.length === 0 ? (
            <div className="paper-card rounded-lg p-12 text-center">
              <p className="font-display text-lg mb-2">Chưa có dữ liệu cho tuần này</p>
              <p className="text-sm text-[var(--muted)]">LMS chưa xuất data, hoặc bạn không phụ trách lớp nào trong tuần.</p>
            </div>
          ) : (
            <div className="space-y-10">
              {classesByCode.map((cls, i) => {
                const sched = classes.find(c => c.class_code === cls.class_code);
                const actv = cls.students.filter(s => !s.is_absent);
                const done = actv.filter(s => s.feedback_text && String(s.feedback_text).trim()).length;
                const totalClass = actv.length;
                const deadlineTs = deadlines[cls.class_code];
                const countdown = deadlineTs ? formatCountdown(deadlineTs - nowTick) : null;
                const allDone = done === totalClass;
                return (
                  <section key={cls.class_code} className="fade-up" style={{animationDelay:`${i*60}ms`}}>
                    <div className="flex items-center gap-3 mb-3 flex-wrap">
                      <div>
                        <h2 className="font-display font-semibold text-2xl leading-tight">{cls.class_code}</h2>
                        {sched && <p className="text-xs font-mono text-[var(--muted)]">{sched.level} · {sched.day1} {sched.time1} – {sched.day2} {sched.time2}</p>}
                      </div>
                      <span className={`chip ${allDone?'chip-good':'chip-warn'}`}>{done}/{totalClass} đã NX</span>
                      {countdown && !allDone && (
                        <span className={`chip ${countdown.cls}`} title={deadlineTs?'Deadline: '+new Date(deadlineTs).toLocaleString('vi-VN'):''}>
                          {countdown.text}
                        </span>
                      )}
                      {countdown && allDone && <span className="chip chip-good">✓ Hoàn thành đúng hạn</span>}
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                      {cls.students.map(s => {
                        const hasNote = s.feedback_text && String(s.feedback_text).trim();
                        const b1 = getScoreChip(s.score_b1);
                        const b2 = getScoreChip(s.score_b2);
                        const cardStyle = s.is_gifted
                          ? {background:'#FAEEDA',borderColor:'#EF9F27'}
                          : s.is_absent ? {background:'#F1EFE8',opacity:0.7} : {};
                        return (
                          <button key={s.rowIndex} onClick={() => setSelected(s)}
                            style={cardStyle}
                            className="paper-card rounded-lg p-4 text-left hover:shadow-lg transition-all hover:-translate-y-0.5 relative">
                            {s.is_gifted && <div className="absolute top-2 right-2"><span style={{background:'#EF9F27',color:'white',padding:'2px 8px',borderRadius:'999px',fontSize:'10px',fontWeight:'600'}}>🎁 Tặng buổi</span></div>}
                            {s.is_absent && !s.is_gifted && <div className="absolute top-2 right-2"><span style={{background:'#888780',color:'white',padding:'2px 8px',borderRadius:'999px',fontSize:'10px',fontWeight:'600'}}>Nghỉ cả tuần</span></div>}
                            {hasNote && !s.is_gifted && !s.is_absent && <div className="absolute top-2 right-2"><span className="stamp">đã NX</span></div>}
                            <h3 className="font-display font-semibold text-lg leading-tight pr-20">{s.full_name}</h3>
                            <p className="text-xs text-[var(--muted)] font-mono mt-0.5">ID: {s.student_id}</p>
                            {s.note && <p className="text-xs mt-2 italic" style={{color:s.is_gifted?'#854F0B':'var(--muted)'}}>{s.note}</p>}
                            {!s.is_absent && (
                              <div className="flex items-center gap-3 mt-3 flex-wrap">
                                <div>
                                  <div className="text-[10px] font-mono uppercase text-[var(--muted)] mb-1">Điểm BTVN B1</div>
                                  <span className={`chip ${b1.cls}`}>{b1.text}</span>
                                </div>
                                <div>
                                  <div className="text-[10px] font-mono uppercase text-[var(--muted)] mb-1">Điểm BTVN B2</div>
                                  <span className={`chip ${b2.cls}`}>{b2.text}</span>
                                </div>
                              </div>
                            )}
                            {s.status && (
                              <div className="mt-3 pt-3 border-t border-dashed border-[var(--line)] text-xs font-mono text-[var(--muted)]">
                                Đánh giá: <span className="text-[var(--ink)] font-medium">{s.status}</span>
                              </div>
                            )}
                          </button>
                        );
                      })}
                    </div>
                  </section>
                );
              })}
            </div>
          )}
        </>
        )}

        {/* ── TAB BÁO CÁO THÁNG ─────────────────────────────── */}
        {mainTab === 'month' && (
        <>
          <div className="mb-6 flex justify-between items-end flex-wrap gap-4">
            <div>
              <p className="text-xs font-mono uppercase tracking-[0.2em] text-[var(--muted)] mb-2">
                {(() => {
                  const today = new Date();
                  const day = today.getDate();
                  // Trước ngày 10: đang điền báo cáo tháng T-1
                  // Từ ngày 10 trở đi: đang điền báo cáo tháng T
                  if (day < 10) {
                    const reportMonth = currentMonth === 1 ? 12 : currentMonth - 1;
                    const reportYear  = currentMonth === 1 ? currentYear - 1 : currentYear;
                    return `Tháng ${reportMonth}/${reportYear} & tháng trước`;
                  } else {
                    return `Tháng ${currentMonth}/${currentYear} & tháng trước`;
                  }
                })()}
              </p>
              <h1 className="font-display text-4xl md:text-5xl font-semibold leading-none">Báo cáo tháng</h1>
            </div>
            <button onClick={reloadMonthly} disabled={loadingMonthly} className="chip chip-muted hover:bg-[var(--ink)] hover:text-[var(--paper)] transition-all font-mono text-xs flex items-center gap-1">
              🔄 Tải lại dữ liệu
            </button>
          </div>
          <p className="mt-3 text-[var(--muted)] max-w-2xl">
              {(() => {
                const today = new Date();
                const day = today.getDate();
                if (day < 10) {
                  // Trước ngày 10/T: báo cáo tháng T-1, deadline ngày 10/T
                  const reportMonth = currentMonth === 1 ? 12 : currentMonth - 1;
                  const reportYear  = currentMonth === 1 ? currentYear - 1 : currentYear;
                  return (
                    <>
                      Viết báo cáo tổng kết tháng cho từng HS. Danh sách bao gồm tháng {reportMonth}/{reportYear} và tháng trước.
                      <strong> Deadline tháng này: 23:59 ngày 10/{currentMonth}/{currentYear}</strong>.
                    </>
                  );
                } else {
                  // Từ ngày 10/T: báo cáo tháng T, deadline ngày 10/T+1
                  const deadlineMonth = currentMonth < 12 ? currentMonth + 1 : 1;
                  const deadlineYear  = currentMonth < 12 ? currentYear : currentYear + 1;
                  return (
                    <>
                      Viết báo cáo tổng kết tháng cho từng HS. Danh sách bao gồm tháng {currentMonth}/{currentYear} và tháng trước.
                      <strong> Deadline tháng này: 23:59 ngày 10/{deadlineMonth}/{deadlineYear}</strong>.
                    </>
                  );
                }
              })()}
            </p>
          </div>

          {loadingMonthly ? (
            <div className="paper-card rounded-lg p-12 text-center text-[var(--muted)] font-mono text-sm">Đang tải danh sách HS...</div>
          ) : monthlyStudents.length === 0 ? (
            <div className="paper-card rounded-lg p-12 text-center">
              <p className="font-display text-lg mb-2">Chưa có danh sách HS báo cáo tháng</p>
              <p className="text-sm text-[var(--muted)]">App sẽ tự tạo danh sách vào ngày 28 hàng tháng, hoặc admin có thể tạo thủ công.</p>
            </div>
          ) : (
            <>
              <div className="mb-6">
                <div className="text-xs font-mono uppercase tracking-wider text-[var(--muted)] mb-1">Tổng tiến độ</div>
                <div className="flex items-baseline gap-4">
                  <span className="font-display text-3xl font-semibold">
                    {monthlyStudents.filter(s => s.is_done).length}<span className="text-[var(--muted)] text-xl">/{monthlyStudents.length}</span>
                  </span>
                  <div className="flex-1 max-w-md h-1.5 bg-[var(--paper-2)] rounded-full overflow-hidden">
                    <div className="h-full bg-[var(--accent)] transition-all"
                      style={{width:`${monthlyStudents.length>0?monthlyStudents.filter(s=>s.is_done).length/monthlyStudents.length*100:0}%`}}/>
                  </div>
                </div>
              </div>

              {/* ── THAY ĐỔI: group theo monthLabel (tháng T trước, T-1 sau) */}
              {(() => {
                // Gom theo monthLabel
                const byMonth = {};
                monthlyStudents.forEach(s => {
                  if (!byMonth[s.monthLabel]) byMonth[s.monthLabel] = [];
                  byMonth[s.monthLabel].push(s);
                });

                return Object.entries(byMonth).map(([monthLabel, mStudents]) => {
                  const byClass = {};
                  mStudents.forEach(s => {
                    if (!byClass[s.class_code]) byClass[s.class_code] = [];
                    byClass[s.class_code].push(s);
                  });
                  const mDone = mStudents.filter(s => s.is_done).length;

                  return (
                    <div key={monthLabel} className="month-divider">
                      <div className="flex items-center gap-3 mb-5">
                        <h2 className="font-display text-2xl font-semibold" style={{color:'var(--accent-dark)'}}>{monthLabel}</h2>
                        <span className={`chip ${mDone===mStudents.length?'chip-good':'chip-warn'}`}>
                          {mDone}/{mStudents.length} đã viết
                        </span>
                      </div>

                      {Object.entries(byClass).map(([code, list], i) => {
                        const done = list.filter(s => s.is_done).length;
                        return (
                          <section key={code} className="mb-8 fade-up" style={{animationDelay:`${i*60}ms`}}>
                            <div className="flex items-center gap-3 mb-3 flex-wrap">
                              <h3 className="font-display font-semibold text-xl leading-tight">{code}</h3>
                              <span className={`chip ${done===list.length?'chip-good':'chip-warn'}`}>{done}/{list.length} đã viết</span>
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                              {list.map(s => (
                                <button key={s.rowIndex + '_' + s.fileId} onClick={() => setSelectedMonthly(s)}
                                  className="paper-card rounded-lg p-4 text-left hover:shadow-lg transition-all hover:-translate-y-0.5 relative">
                                  {s.is_done && <div className="absolute top-2 right-2"><span className="stamp">đã viết</span></div>}
                                  <h3 className="font-display font-semibold text-lg leading-tight pr-12">{s.full_name}</h3>
                                  <p className="text-xs text-[var(--muted)] font-mono mt-0.5">ID: {s.student_id}</p>
                                  <p className="text-xs text-[var(--muted)] font-mono mt-1">Bắt đầu: {s.start_date}</p>
                                  {s.word_url && (
                                    <a href={s.word_url} target="_blank" onClick={e => e.stopPropagation()}
                                      className="inline-block mt-2 text-xs font-mono text-[var(--accent)] hover:underline">
                                      📄 Mở file Word ↗
                                    </a>
                                  )}
                                </button>
                              ))}
                            </div>
                          </section>
                        );
                      })}
                    </div>
                  );
                });
              })()}
            </>
          )}
        </>
        )}
      </main>

      {/* ── Panel nhận xét tuần */}
      {selected && (
        <DetailPanel
          key={selected.student_id + '_' + selected.rowIndex}
          student={selected}
          fileId={activeWeekFileId || (fileInfo && fileInfo.id)}  // ← THAY ĐỔI: dùng activeWeekFileId
          tab={activeWeek}
          currentMonth={currentMonth}
          currentYear={currentYear}
          teacherLogin={teacher.login}
          onClose={() => setSelected(null)}
          onSaved={(updatedFields) => {
            setStudents(prev => prev.map(s => 
              s.rowIndex === selected.rowIndex ? { ...s, ...updatedFields } : s
            ));
            setSelected(null);
            setToast('✓ Đã lưu vào Google Sheet');
            setTimeout(() => setToast(null), 2500);
          }}
        />
      )}

      {/* ── Panel báo cáo tháng */}
      {/* ── THAY ĐỔI: dùng student.fileId từ mỗi student object thay vì monthlyFile.id chung */}
      {selectedMonthly && (
        <MonthlyDetailPanel
          key={selectedMonthly.student_id + '_' + selectedMonthly.fileId}
          student={selectedMonthly}
          fileId={selectedMonthly.fileId}          // ← fileId của file tháng tương ứng
          currentMonth={selectedMonthly.month}     // ← month của student đó (T hoặc T-1)
          currentYear={selectedMonthly.year}
          teacherLogin={teacher.login}
          onClose={() => setSelectedMonthly(null)}
          onSaved={(updatedFields) => {
            setMonthlyStudents(prev => prev.map(s => 
              (s.rowIndex === selectedMonthly.rowIndex && s.fileId === selectedMonthly.fileId) 
                ? { ...s, ...updatedFields } 
                : s
            ));
            setSelectedMonthly(null);
            setToast('✓ Đã lưu báo cáo tháng');
            setTimeout(() => setToast(null), 2500);
          }}
        />
      )}

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

// ── Detail panel nhận xét tuần ─────────────────────────────
function DetailPanel({ student, fileId, tab, currentMonth, currentYear, teacherLogin, onClose, onSaved }) {
  const [view, setView] = useState('write');
  const [note, setNote] = useState(student.feedback_text != null ? String(student.feedback_text) : '');
  const [scoreB1, setScoreB1] = useState(student.score_b1 != null ? String(student.score_b1) : '');
  const [scoreB2, setScoreB2] = useState(student.score_b2 != null ? String(student.score_b2) : '');
  const [statusEvaluation, setStatusEvaluation] = useState(student.status != null ? String(student.status) : '');
  const [suggestion, setSuggestion] = useState('');
  const [loadingAi, setLoadingAi] = useState(false);
  const [saving, setSaving] = useState(false);
  const [copied, setCopied] = useState(false);
  const [history, setHistory] = useState([]);

  useEffect(() => {
    // ── THAY ĐỔI: getStudentHistory đã cập nhật backend để trả về cả T và T-1
    callApi('getStudentHistory', student.student_id, currentMonth, currentYear, teacherLogin).then(d => {
      if (d.history) setHistory(d.history);
    });
  }, [student.student_id]);

  const fetchAi = async () => {
    setLoadingAi(true);
    const d = await callApi('getAiSuggestion', {
      full_name: student.full_name, class_code: student.class_code,
      status: student.status, note: student.note,
      score_b1: scoreB1, score_b2: scoreB2,
    });
    setSuggestion(d.suggestion || '');
    setLoadingAi(false);
  };

  const generateParent = () =>
`BÁO CÁO HỌC TẬP TUẦN ${student.week}

Họ tên học sinh: ${student.full_name}.
Lớp: ${student.class_code}.
Giáo viên chủ nhiệm: ${student.teacher_login}.

Điểm BTVN Buổi 1: ${scoreB1 || 'chưa có'}.
Điểm BTVN Buổi 2: ${scoreB2 || 'chưa có'}.

Nhận xét của thầy cô:
${note}`;

  const handleSave = async () => {
    const missingFields = [];
    if (!statusEvaluation || !statusEvaluation.trim()) missingFields.push("Đánh giá chung");
    if (!student.is_absent) {
      if (!scoreB1 || !scoreB1.trim()) missingFields.push("Điểm BTVN buổi 1");
      if (!scoreB2 || !scoreB2.trim()) missingFields.push("Điểm BTVN buổi 2");
    }
    if (!note || !note.trim()) missingFields.push("Nhận xét chung");

    if (missingFields.length > 0) {
      alert("Không thể lưu! Vui lòng điền đầy đủ các trường:\n• " + missingFields.join("\n• "));
      return;
    }
    setSaving(true);
    // fileId truyền vào đây đã là activeWeekFileId (đúng file dù tuần thuộc T hay T-1), kèm student_id để chống lệch dòng
    const result = await callApi('saveFeedback', fileId, tab, student.rowIndex, note, generateParent(), teacherLogin, scoreB1, scoreB2, statusEvaluation, student.student_id);
    setSaving(false);
    if (result.error) alert('Lỗi: ' + result.error);
    else onSaved({
      feedback_text: note,
      score_b1: scoreB1,
      score_b2: scoreB2,
      status: statusEvaluation
    });
  };

  const copyParent = async () => {
    await navigator.clipboard.writeText(generateParent());
    setCopied(true);
    setTimeout(() => setCopied(false), 1500);
  };

  const TEMPLATES = [
    { tag: 'BTVN tốt', text: '- BTVN: Con tự giác làm đầy đủ BTVN và đạt điểm tốt, cô khen con.' },
    { tag: 'BTVN cần nhắc', text: '- BTVN: Con chú ý dành thời gian làm đầy đủ BTVN nhé.' },
    { tag: 'Kiến thức (mẫu)', text: '- Kiến thức:\n+ Buổi 1: [nội dung buổi 1]\n+ Buổi 2: [nội dung buổi 2]' },
    { tag: 'Thái độ tốt', text: '- Thái độ học tập: Trong giờ con tập trung chú ý vào bài giảng.' },
  ];

  return (
    <div className="fixed inset-0 bg-[var(--ink)]/40 backdrop-blur-sm z-50 flex justify-end fade-up">
      <div className="bg-[var(--paper)] w-full max-w-2xl h-full overflow-y-auto shadow-2xl">
        <div className="sticky top-0 bg-[var(--paper)] border-b border-[var(--line)] px-6 py-4 z-10">
          <div className="flex items-start justify-between gap-4">
            <div className="flex-1 min-w-0">
              <p className="text-xs font-mono text-[var(--muted)] uppercase tracking-wider truncate">{student.class_code} · {student.week}</p>
              <h2 className="font-display font-semibold text-2xl mt-1">{student.full_name}</h2>
              <p className="text-xs font-mono text-[var(--muted)] mt-2">ID: {student.student_id} · Bắt đầu: {student.start_date}</p>
            </div>
            <button onClick={onClose} className="w-9 h-9 rounded-md ghost-btn grid place-items-center text-xl font-light">×</button>
          </div>
        </div>

        <div className="px-6 pt-4">
          <div className="flex gap-1 p-1 bg-[var(--paper-2)] rounded-md inline-flex">
            {[{id:'write',label:'Viết nhận xét'},{id:'history',label:`Lịch sử (${history.length})`}].map(t => (
              <button key={t.id} onClick={() => setView(t.id)}
                className={`px-4 py-2 text-sm rounded font-medium ${view===t.id?'bg-[var(--ink)] text-[var(--paper)]':'text-[var(--ink)] hover:bg-black/5'}`}>
                {t.label}
              </button>
            ))}
          </div>
        </div>

        <div className="px-6 py-6">
          {view === 'write' && (
            <div className="space-y-5 fade-up">
              {student.is_absent && (
                <div style={{background:'#F1EFE8',border:'1px solid #B4B2A9',borderRadius:8,padding:'12px 16px',fontSize:13}}>
                  <strong>HS nghỉ cả tuần</strong> — không cần viết nhận xét tuần này.
                </div>
              )}
              {student.is_gifted && (
                <div style={{background:'#FAEEDA',border:'1px solid #EF9F27',borderRadius:8,padding:'12px 16px',fontSize:13,color:'#854F0B'}}>
                  🎁 <strong>HS tặng buổi</strong> — {student.note}
                </div>
              )}
              {student.note && !student.is_gifted && !student.is_absent && (
                <div style={{background:'rgba(45,106,79,0.08)',border:'1px solid rgba(45,106,79,0.3)',borderRadius:8,padding:'12px 16px',fontSize:13,color:'var(--good)'}}>
                  <strong>Ghi chú:</strong> {student.note}
                </div>
              )}

              <div className="paper-card rounded-md p-4 grid grid-cols-3 gap-4">
                <div>
                  <label className="text-xs font-mono text-[var(--muted)] uppercase mb-2 block">Đánh giá</label>
                  <select className="field w-full text-center font-display text-sm font-semibold"
                    style={{padding:'8px 10px'}}
                    value={statusEvaluation} onChange={e => setStatusEvaluation(e.target.value)} disabled={student.is_absent}>
                    <option value="">— Chọn —</option>
                    <option value="Xuất sắc">Xuất sắc</option>
                    <option value="Tốt">Tốt</option>
                    <option value="Đạt">Đạt</option>
                    <option value="Cần cố gắng">Cần cố gắng</option>
                  </select>
                </div>
                <div>
                  <label className="text-xs font-mono text-[var(--muted)] uppercase mb-2 block">BTVN B1</label>
                  <input type="text" className="field w-full text-center font-display text-lg font-semibold"
                    style={{padding:'6px 10px'}} placeholder="—"
                    value={scoreB1} onChange={e => setScoreB1(e.target.value)} disabled={student.is_absent} />
                </div>
                <div>
                  <label className="text-xs font-mono text-[var(--muted)] uppercase mb-2 block">BTVN B2</label>
                  <input type="text" className="field w-full text-center font-display text-lg font-semibold"
                    style={{padding:'6px 10px'}} placeholder="—"
                    value={scoreB2} onChange={e => setScoreB2(e.target.value)} disabled={student.is_absent} />
                </div>
              </div>

              <div className="border-l-2 border-[var(--accent)] pl-4 py-1">
                <div className="flex items-center gap-2 mb-2">
                  <span className="text-xs font-mono uppercase tracking-wider text-[var(--accent)] font-semibold">Gợi ý từ Claude</span>
                  {!suggestion && !loadingAi && <button onClick={fetchAi} className="text-xs font-mono text-[var(--accent)] hover:underline">→ tạo gợi ý</button>}
                </div>
                {loadingAi && <p className="text-sm italic text-[var(--muted)]">Đang phân tích...</p>}
                {suggestion && (
                  <>
                    <pre className="text-sm italic font-display leading-relaxed whitespace-pre-wrap" style={{fontFamily:'inherit'}}>{suggestion}</pre>
                    <button onClick={() => setNote(suggestion)} className="text-xs font-mono text-[var(--accent)] hover:underline mt-2">→ Dùng bản này</button>
                  </>
                )}
              </div>

              <div>
                <div className="text-xs font-mono uppercase tracking-wider text-[var(--muted)] mb-2">Mẫu nhanh</div>
                <div className="flex flex-wrap gap-2">
                  {TEMPLATES.map((t, i) => (
                    <button key={i} onClick={() => setNote(n => n ? n + '\n' + t.text : t.text)}
                      className="chip hover:bg-[var(--ink)] hover:text-[var(--paper)] hover:border-[var(--ink)] transition-colors">+ {t.tag}</button>
                  ))}
                </div>
              </div>

              <div>
                <div className="flex items-center justify-between mb-2">
                  <label className="text-xs font-mono uppercase tracking-wider text-[var(--muted)]">Nhận xét chung (buổi 1 + 2)</label>
                  <span className="text-xs font-mono text-[var(--muted)]">{note.length} ký tự</span>
                </div>
                <div className="paper-card rounded-md p-4">
                  <textarea className="notebook min-h-[280px]" placeholder="Bắt đầu viết nhận xét..."
                    value={note} onChange={e => setNote(e.target.value)} />
                </div>
              </div>

              <div className="flex gap-2 pt-2">
                <button onClick={copyParent} disabled={!note.trim()} className="ghost-btn px-5 py-2.5 rounded-md text-sm font-medium disabled:opacity-40">
                  {copied ? '✓ Đã copy' : 'Copy mẫu gửi PH'}
                </button>
                <button onClick={handleSave} disabled={!note.trim() || saving} className="accent-btn px-5 py-2.5 rounded-md text-sm font-medium flex-1 disabled:opacity-40">
                  {saving ? 'Đang lưu...' : 'Lưu vào Google Sheet'}
                </button>
              </div>
            </div>
          )}

          {view === 'history' && (
            <div className="space-y-4 fade-up">
              {history.length === 0 ? (
                <div className="text-center py-12 text-[var(--muted)] font-mono text-sm">Chưa có dữ liệu các tuần khác</div>
              ) : (
                history.map((h, i) => (
                  <div key={i} className="paper-card rounded-md p-4">
                    <div className="flex items-baseline justify-between mb-2 flex-wrap gap-2">
                      <span className="font-display font-semibold">{h.tab}</span>
                      <span className="text-xs font-mono text-[var(--muted)]">B1: {h.score_b1 || '—'} · B2: {h.score_b2 || '—'}</span>
                    </div>
                    {h.note && <p className="text-xs text-[var(--muted)] italic mb-1">{h.note}</p>}
                    {h.feedback_text
                      ? <p className="text-sm leading-relaxed whitespace-pre-line">{h.feedback_text}</p>
                      : <p className="text-sm italic text-[var(--muted)]">(Chưa có nhận xét)</p>}
                  </div>
                ))
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Monthly detail panel ────────────────────────────────────
function MonthlyDetailPanel({ student, fileId, currentMonth, currentYear, teacherLogin, onClose, onSaved }) {
  const [fields, setFields] = useState({
    diem_dat_duoc: student.diem_dat_duoc != null ? String(student.diem_dat_duoc) : '',
    kt_dat:        student.kt_dat        != null ? String(student.kt_dat)        : '',
    kt_caithien:   student.kt_caithien   != null ? String(student.kt_caithien)   : '',
    kn_dat:        student.kn_dat        != null ? String(student.kn_dat)        : '',
    kn_caithien:   student.kn_caithien   != null ? String(student.kn_caithien)   : '',
    td_dat:        student.td_dat        != null ? String(student.td_dat)        : '',
    td_caithien:   student.td_caithien   != null ? String(student.td_caithien)   : '',
    khac_phuc:     student.khac_phuc     != null ? String(student.khac_phuc)     : '',
    giai_phap:     student.giai_phap     != null ? String(student.giai_phap)     : '',
  });
  const [saving, setSaving] = useState(false);
  const [exporting, setExporting] = useState(false);
  const [loadingAi, setLoadingAi] = useState(false);
  const [aiResult, setAiResult] = useState(null);

  const updateField = (k, v) => setFields(prev => ({ ...prev, [k]: v }));

  const handleSave = async () => {
    if (!fields.diem_dat_duoc || !fields.diem_dat_duoc.trim()) {
      alert("Không thể lưu! Vui lòng điền đầy đủ: Điểm con đạt được");
      return;
    }
    setSaving(true);
    // ── THAY ĐỔI: fileId là student.fileId, truyền thêm student_id để chống lệch dòng
    const result = await callApi('saveMonthlyReport', fileId, student.rowIndex, fields, teacherLogin, student.student_id);
    setSaving(false);
    if (result.error) alert('Lỗi: ' + result.error);
    else onSaved({
      diem_dat_duoc: fields.diem_dat_duoc,
      kt_dat: fields.kt_dat,
      kt_caithien: fields.kt_caithien,
      kn_dat: fields.kn_dat,
      kn_caithien: fields.kn_caithien,
      td_dat: fields.td_dat,
      td_caithien: fields.td_caithien,
      khac_phuc: fields.khac_phuc,
      giai_phap: fields.giai_phap,
      is_done: !!(fields.kt_dat || fields.kn_dat || fields.td_dat)
    });
  };

  const handleExportWord = async () => {
    if (!fields.diem_dat_duoc || !fields.diem_dat_duoc.trim()) {
      alert("Không thể xuất Word! Vui lòng điền đầy đủ: Điểm con đạt được");
      return;
    }
    if (!fields.kt_dat && !fields.kn_dat && !fields.td_dat) {
      alert('Vui lòng điền ít nhất các phần Đạt được trước khi xuất Word');
      return;
    }
    setExporting(true);
    await callApi('saveMonthlyReport', fileId, student.rowIndex, fields, teacherLogin, student.student_id);
    // ── THAY ĐỔI: truyền student.month và student.year và student_id
    const result = await callApi('exportMonthlyReportToWord', fileId, student.rowIndex, teacherLogin, currentMonth, currentYear, student.student_id);
    setExporting(false);
    if (result.error) alert('Lỗi xuất Word: ' + result.error);
    else {
      onSaved({
        diem_dat_duoc: fields.diem_dat_duoc,
        kt_dat: fields.kt_dat,
        kt_caithien: fields.kt_caithien,
        kn_dat: fields.kn_dat,
        kn_caithien: fields.kn_caithien,
        td_dat: fields.td_dat,
        td_caithien: fields.td_caithien,
        khac_phuc: fields.khac_phuc,
        giai_phap: fields.giai_phap,
        word_url: result.url,
        is_done: true
      });
      window.open(result.url, '_blank');
    }
  };

  const fetchAi = async () => {
    setLoadingAi(true);
    // ── THAY ĐỔI: truyền đúng month/year của student
    const d = await callApi('getAiMonthlySuggestion', student, currentMonth, currentYear);
    setLoadingAi(false);
    if (d.suggestion && typeof d.suggestion === 'object') setAiResult(d.suggestion);
    else alert('Không tạo được gợi ý từ AI. Vui lòng viết tay.');
  };

  const applyAi = (key) => { if (aiResult && aiResult[key]) updateField(key, aiResult[key]); };
  const applyAllAi = () => { if (aiResult) setFields(prev => ({ ...prev, ...aiResult })); };

  const TEMPLATES = {
    kt_dat: '- Con đã tiếp thu được:\n+ [Chủ đề 1]\n+ [Chủ đề 2]\n- Vận dụng được vào các dạng bài [...]',
    kt_caithien: '- Con cần rèn thêm:\n+ [Dạng bài cần rèn]\n+ [Kỹ năng cần luyện]',
    kn_dat: '- Con có thái độ nghiêm túc khi làm bài.\n- Trình bày rõ ràng, sạch sẽ.\n- Hoàn thành các bài cơ bản tốt.',
    td_dat: '- Con chủ động và tích cực trong giờ học.\n- Lễ phép với thầy cô, hoà đồng với bạn.\n- Tuân thủ nội quy lớp.',
    khac_phuc: '- Con đã khắc phục được [điểm yếu cũ].\n- Tiến bộ rõ rệt trong [kỹ năng/thái độ].',
    giai_phap: '- Tiếp tục luyện thêm [dạng bài].\n- Lập kế hoạch ôn tập hợp lý.\n- Chủ động xem lại bài sau buổi học.',
  };

  return (
    <div className="fixed inset-0 bg-[var(--ink)]/40 backdrop-blur-sm z-50 flex justify-end fade-up">
      <div className="bg-[var(--paper)] w-full max-w-3xl h-full overflow-y-auto shadow-2xl">
        <div className="sticky top-0 bg-[var(--paper)] border-b border-[var(--line)] px-6 py-4 z-10">
          <div className="flex items-start justify-between gap-4">
            <div className="flex-1 min-w-0">
              {/* ── THAY ĐỔI: hiển thị đúng tháng của student */}
              <p className="text-xs font-mono text-[var(--muted)] uppercase tracking-wider truncate">
                Báo cáo {student.monthLabel} · {student.class_code}
              </p>
              <h2 className="font-display font-semibold text-2xl mt-1">{student.full_name}</h2>
              <p className="text-xs font-mono text-[var(--muted)] mt-2">ID: {student.student_id} · Bắt đầu: {student.start_date}</p>
            </div>
            <button onClick={onClose} className="w-9 h-9 rounded-md ghost-btn grid place-items-center text-xl font-light">×</button>
          </div>
        </div>

        <div className="px-6 py-6 space-y-5">
          <div className="border-l-2 border-[var(--accent)] pl-4 py-1">
            <div className="flex items-center gap-2 mb-2">
              <span className="text-xs font-mono uppercase tracking-wider text-[var(--accent)] font-semibold">Gợi ý tổng hợp từ AI</span>
              {!aiResult && !loadingAi && (
                <button onClick={fetchAi} className="text-xs font-mono text-[var(--accent)] hover:underline">→ Tạo gợi ý từ data 4 tuần</button>
              )}
              {aiResult && (
                <button onClick={applyAllAi} className="text-xs font-mono text-[var(--accent)] hover:underline">→ Dùng tất cả</button>
              )}
            </div>
            {loadingAi && <p className="text-sm italic text-[var(--muted)]">Đang phân tích data 4 tuần để gợi ý báo cáo tháng...</p>}
            {aiResult && <p className="text-xs text-[var(--muted)] italic">AI đã tạo gợi ý. Bấm "→ Dùng gợi ý AI" ở từng phần hoặc "Dùng tất cả" ở trên.</p>}
          </div>

          <div>
            <label className="block text-xs font-mono uppercase tracking-wider text-[var(--muted)] mb-2">Điểm con đạt được</label>
            <input type="text" className="field w-full" placeholder="VD: 8.5 hoặc 'chưa có'"
              value={fields.diem_dat_duoc} onChange={e => updateField('diem_dat_duoc', e.target.value)} />
          </div>

          {[
            { key1:'kt_dat', key2:'kt_caithien', label:'Kiến thức', dual:true },
            { key1:'kn_dat', key2:'kn_caithien', label:'Kỹ năng làm bài', dual:true },
            { key1:'td_dat', key2:'td_caithien', label:'Thái độ học tập', dual:false },
            { key1:'khac_phuc', label:'Những nhược điểm con khắc phục được', dual:false },
            { key1:'giai_phap', label:'Giải pháp định hướng', dual:false },
          ].map(section => (
            <div key={section.key1} className="paper-card rounded-md p-4">
              <div className="flex items-baseline justify-between mb-3 flex-wrap gap-2">
                <h3 className="font-display font-semibold text-lg">{section.label}</h3>
                <div className="flex gap-2 flex-wrap">
                  <button onClick={() => updateField(section.key1, fields[section.key1] ? fields[section.key1] + '\n' + TEMPLATES[section.key1] : TEMPLATES[section.key1])}
                    className="chip hover:bg-[var(--ink)] hover:text-[var(--paper)] hover:border-[var(--ink)] text-xs">+ Mẫu nhanh</button>
                  {aiResult && aiResult[section.key1] && (
                    <button onClick={() => applyAi(section.key1)} className="chip chip-good hover:opacity-80 text-xs">→ Dùng gợi ý AI</button>
                  )}
                </div>
              </div>
              <div className={section.dual ? 'grid grid-cols-1 md:grid-cols-2 gap-3' : ''}>
                <div>
                  {section.dual && <label className="text-xs font-mono uppercase tracking-wider text-[var(--muted)] mb-1 block">Con đạt được</label>}
                  <textarea className="field w-full" rows={6}
                    placeholder={section.dual ? 'Con đạt được...' : 'Nhận xét...'}
                    value={fields[section.key1]} onChange={e => updateField(section.key1, e.target.value)} />
                </div>
                {section.dual && (
                  <div>
                    <label className="text-xs font-mono uppercase tracking-wider text-[var(--muted)] mb-1 block">Con cần cải thiện</label>
                    <textarea className="field w-full" rows={6} placeholder="Con cần cải thiện..."
                      value={fields[section.key2]} onChange={e => updateField(section.key2, e.target.value)} />
                  </div>
                )}
              </div>
            </div>
          ))}

          <div className="flex gap-2 pt-2">
            <button onClick={handleExportWord} disabled={exporting || saving}
              className="ghost-btn px-5 py-2.5 rounded-md text-sm font-medium disabled:opacity-40">
              {exporting ? 'Đang xuất Word...' : '📄 Xuất file Word'}
            </button>
            <button onClick={handleSave} disabled={saving || exporting}
              className="accent-btn px-5 py-2.5 rounded-md text-sm font-medium flex-1 disabled:opacity-40">
              {saving ? 'Đang lưu...' : '💾 Lưu vào Google Sheet'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
